<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Alumnos - Frontend</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="p-4 bg-light">
    <main class="container">
        <section id="loginSection" class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h1 class="h4 mb-2">Iniciar sesion</h1>
                        <p class="text-muted mb-3">Accede para administrar alumnos.</p>
                        <form id="loginForm" class="row g-3">
                            <div class="col-12">
                                <label class="form-label" for="username">Usuario</label>
                                <input id="username" name="username" type="text" autocomplete="username" class="form-control" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label" for="password">Password</label>
                                <input id="password" name="password" type="password" autocomplete="current-password" class="form-control" required>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary w-100">Entrar</button>
                            </div>
                        </form>
                        <p id="loginMessage" class="message mt-3 mb-0"></p>
                        <p class="small text-muted mt-2 mb-0">Usuario inicial: <strong>admin</strong> | Password: <strong>Admin123*</strong></p>
                    </div>
                </div>
            </div>
        </section>

        <section id="appSection" class="hidden">
            <header class="d-flex justify-content-between align-items-center mb-2 gap-2 flex-wrap">
                <div>
                    <h1 class="h3 mb-0">Registro de Alumnos</h1>
                    <p id="welcomeText" class="text-muted mb-0"></p>
                </div>
                <div class="d-flex gap-2">
                    <button id="exportButton" type="button" class="btn btn-primary">Exportar CSV</button>
                    <button id="logoutButton" type="button" class="btn btn-outline-danger">Cerrar sesion</button>
                </div>
            </header>

            <section class="card mb-4">
                <div class="card-body">
                    <h2 id="formTitle" class="h5">Registrar alumno</h2>
                    <form id="alumnoForm" class="row g-3" novalidate>
                    <input id="alumnoId" type="hidden">

                    <div class="col-md-4">
                        <label class="form-label" for="primer_apellido">Apellido Paterno</label>
                        <input id="primer_apellido" name="primer_apellido" type="text" class="form-control" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="segundo_apellido">Apellido Materno</label>
                        <input id="segundo_apellido" name="segundo_apellido" type="text" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="nombres">Nombre</label>
                        <input id="nombres" name="nombres" type="text" class="form-control" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="no_cuenta">Numero de Cuenta</label>
                        <input id="no_cuenta" name="no_cuenta" type="text" class="form-control" maxlength="9" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="correo">Correo</label>
                        <input id="correo" name="correo" type="email" class="form-control" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="contacto">Contacto</label>
                        <input id="contacto" name="contacto" type="text" class="form-control" maxlength="10" required>
                    </div>

                    <div class="d-flex gap-2 mt-2">
                        <button type="submit" id="saveButton" class="btn btn-success">Registrar alumno</button>
                        <button type="button" id="cancelEditButton" class="btn btn-outline-secondary hidden">Cancelar edicion</button>
                    </div>
                </form>
                    <p id="formMessage" class="message mt-3 mb-0"></p>
                </div>
            </section>

            <section class="table-responsive" style="max-height: 420px; overflow-y: auto;">
                <table class="table table-striped table-bordered table-hover text-center align-middle">
                    <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Apellido Paterno</th>
                                <th>Apellido Materno</th>
                                <th>Nombre</th>
                                <th>Numero de Cuenta</th>
                                <th>Correo</th>
                                <th>Contacto</th>
                                <th>Accion</th>
                            </tr>
                        </thead>
                    <tbody id="alumnosTbody"></tbody>
                </table>
            </section>
            <p id="tableMessage" class="message mt-2"></p>
        </section>
    </main>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
</body>
</html>
